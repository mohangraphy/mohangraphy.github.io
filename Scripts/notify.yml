name: Notify Subscribers (Manual Only)

on:
  # Triggered only via the Actions tab in GitHub
  workflow_dispatch:
    inputs:
      notification_type:
        description: 'What are you sending?'
        required: true
        type: choice
        options:
          - photos
          - blog
        default: 'photos'

      test_only:
        description: 'True = Send ONLY to test_email'
        required: true
        type: boolean
        default: true

      test_email:
        description: 'Email for test send (Required if Test Only is true)'
        required: false
        default: 'your-email@example.com'

      blog_post_title:
        description: 'Title (Blog only)'
        required: false
      blog_post_place:
        description: 'Place (Blog only)'
        required: false
      blog_post_summary:
        description: 'Summary (Blog only)'
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    
    # THIS IS THE CRITICAL PLACEMENT
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send Notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOTIFICATION_TYPE: ${{ github.event.inputs.notification_type }}
          TEST_ONLY: ${{ github.event.inputs.test_only }}
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
          BLOG_TITLE: ${{ github.event.inputs.blog_post_title }}
          BLOG_PLACE: ${{ github.event.inputs.blog_post_place }}
          BLOG_SUMMARY: ${{ github.event.inputs.blog_post_summary }}
        run: node Scripts/send.js