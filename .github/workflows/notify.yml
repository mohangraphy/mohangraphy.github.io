name: Notify Subscribers

on:
  push:
    branches: [main]
    paths:
      - 'Photos/**'

  workflow_dispatch:
    inputs:
      notification_type:
        description: 'photos or blog'
        required: false
        default: 'photos'
        type: choice
        options:
          - photos
          - blog

      test_only:
        description: 'Send only to test email?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

      test_email:
        description: 'Email for test send'
        required: false
        default: 'info@mohangraphy.com'

      blog_post_title:
        description: 'Blog post title'
        required: false
        default: ''

      blog_post_place:
        description: 'Blog post place'
        required: false
        default: ''

      blog_post_summary:
        description: 'Blog post summary'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─────────────────────────────────────────────
      # SEND NOTIFICATIONS (single script)
      # ─────────────────────────────────────────────
      - name: Send notifications
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          NOTIFICATION_TYPE: ${{ github.event.inputs.notification_type || 'photos' }}

          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

          BLOG_TITLE: ${{ github.event.inputs.blog_post_title }}
          BLOG_PLACE: ${{ github.event.inputs.blog_post_place }}
          BLOG_SUMMARY: ${{ github.event.inputs.blog_post_summary }}

          # 🔴 SAFETY: DEFAULT = TEST MODE
          TEST_ONLY: ${{ github.event.inputs.test_only || 'true' }}
          TEST_EMAIL: ${{ github.event.inputs.test_email || 'info@mohangraphy.com' }}

        run: node Scripts/send.js