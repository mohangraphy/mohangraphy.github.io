name: Notify Subscribers on New Photos

on:
  push:
    branches: [main]
    paths:
      - 'Photos/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send email notifications
        run: |
          node -e "
          const https = require('https');

          const options = {
            hostname: 'xjcpryfgodgqqtbblklg.supabase.co',
            path: '/rest/v1/subscribers?select=email,name',
            headers: {
              'apikey': process.env.SUPABASE_SERVICE_KEY,
              'Authorization': 'Bearer ' + process.env.SUPABASE_SERVICE_KEY
            }
          };

          https.get(options, res => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', async () => {
              const subscribers = JSON.parse(data);
              console.log('Subscribers found:', subscribers.length);

              for (const sub of subscribers) {
                const body = JSON.stringify({
                  from: 'Mohangraphy <photos@mohangraphy.com>',
                  to: [sub.email],
                  subject: 'New photos just added to Mohangraphy!',
                  html: \`<div style='font-family:sans-serif;max-width:600px;margin:auto;background:#080808;color:#fff;padding:40px'>
                    <h1 style='font-family:Georgia,serif;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:#c9a96e'>Mohangraphy</h1>
                    <p style='color:rgba(255,255,255,0.6)'>Hi \${sub.name || 'there'},</p>
                    <p style='color:rgba(255,255,255,0.6)'>New photos have just been added to the gallery. Come take a look!</p>
                    <a href='https://mohangraphy.com' style='display:inline-block;margin-top:20px;padding:12px 28px;background:none;color:#c9a96e;border:1px solid #c9a96e;text-decoration:none;font-family:sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase'>View New Photos</a>
                    <p style='color:rgba(255,255,255,0.2);font-size:11px;margin-top:40px'>You received this because you subscribed at mohangraphy.com</p>
                  </div>\`
                });

                await new Promise((resolve, reject) => {
                  const req = https.request({
                    hostname: 'api.resend.com',
                    path: '/emails',
                    method: 'POST',
                    headers: {
                      'Authorization': 'Bearer ' + process.env.RESEND_API_KEY,
                      'Content-Type': 'application/json',
                      'Content-Length': Buffer.byteLength(body)
                    }
                  }, r => {
                    let d = '';
                    r.on('data', c => d += c);
                    r.on('end', () => { console.log('Sent to', sub.email, d); resolve(); });
                  });
                  req.on('error', reject);
                  req.write(body);
                  req.end();
                });
              }
            });
          });
          "
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
