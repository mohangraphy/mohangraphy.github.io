name: Notify Subscribers

on:
  push:
    branches: [main]
    paths:
      - 'Photos/**'

  workflow_dispatch:
    inputs:
      notification_type:
        description: 'photos or blog'
        required: true
        default: 'blog'
      test_only:
        description: 'true = send to test_email only'
        required: false
        default: 'false'
      test_email:
        description: 'Email for test send'
        required: false
        default: ''
      blog_post_title:
        description: 'Blog post title'
        required: false
        default: ''
      blog_post_place:
        description: 'Blog post place'
        required: false
        default: ''
      blog_post_summary:
        description: 'Blog post summary'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Send notification
        run: node Scripts/send.js
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          NOTIFICATION_TYPE: ${{ github.event.inputs.notification_type }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BLOG_TITLE: ${{ github.event.inputs.blog_post_title }}
          BLOG_PLACE: ${{ github.event.inputs.blog_post_place }}
          BLOG_SUMMARY: ${{ github.event.inputs.blog_post_summary }}
          TEST_ONLY: ${{ github.event.inputs.test_only }}
          TEST_EMAIL: ${{ github.event.inputs.test_email }}
